<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Deployed Web App</title>
    <style>
        /* CSS is embedded inside the HTML file */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #232f3e 0%, #1a1a1a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #ff9900; /* AWS Orange */
            margin-bottom: 10px;
        }
        button {
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #ec8b00;
        }
        #output {
            margin-top: 20px;
            font-size: 18px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AWS Cloud App</h1>
        <p>Your HTML, CSS, and JS application is ready for AWS deployment.</p>
        <button id="cloudBtn">Trigger Action</button>
        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
